<svg width="1080" height="1920" viewBox="0 0 1080 1920" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgBase" x1="540" y1="0" x2="540" y2="1920" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#fffefc"/>
      <stop offset="1" stop-color="#fffaf3"/>
    </linearGradient>
    <radialGradient id="roseGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(120 180) rotate(28) scale(340 260)">
      <stop stop-color="#f4c8cf" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#f4c8cf" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="sageGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(980 180) rotate(145) scale(300 260)">
      <stop stop-color="#d8e3cf" stop-opacity="0.6"/>
      <stop offset="1" stop-color="#d8e3cf" stop-opacity="0"/>
    </radialGradient>
    <style>
      .brand { fill: #5C5752; font-size: 142px; font-weight: 700; font-family: Georgia; }
      .headline { fill: #35261E; font-size: 74px; font-weight: 700; font-family: Georgia; }
      .copy { fill: #78685E; font-size: 44px; font-weight: 500; font-family: Arial; }
      .eyebrow { fill: #78685E; font-size: 26px; font-weight: 700; letter-spacing: 3px; font-family: Arial; }
    </style>
  </defs>
  <rect width="1080" height="1920" fill="url(#bgBase)"/>
  <rect width="1080" height="1920" fill="url(#roseGlow)"/>
  <rect width="1080" height="1920" fill="url(#sageGlow)"/>
  <rect x="88" y="108" width="182" height="46" rx="23" fill="#FFFFFF" fill-opacity="0.78"/>
  <text x="118" y="138" class="eyebrow">ANGEL VAULT</text>
  <ellipse cx="302" cy="432" rx="104" ry="32" stroke="#5C5752" stroke-width="22"/>
  <text x="122" y="620" class="brand">angel vault</text>
  <text x="122" y="890" class="headline">A softer way to track</text>
  <text x="122" y="970" class="headline">your collection.</text>
  <text x="122" y="1130" class="copy">Minimal design. Warm paper palette.</text>
  <text x="122" y="1188" class="copy">Built for collectors and display lovers.</text>
  <rect x="122" y="1320" width="836" height="250" rx="32" fill="#FFFFFF" fill-opacity="0.56" stroke="#563E31" stroke-opacity="0.12"/>
  <text x="164" y="1412" class="copy">Use for launches, story covers,</text>
  <text x="164" y="1470" class="copy">feature slides, or countdown posts.</text>
</svg>
